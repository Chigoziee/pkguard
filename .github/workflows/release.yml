name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: pkguard-linux-amd64
          - os: ubuntu-24.04-arm
            artifact: pkguard-linux-arm64
          - os: macos-latest
            artifact: pkguard-macos-amd64
          - os: macos-latest
            artifact: pkguard-macos-arm64
          - os: windows-latest
            artifact: pkguard-windows-amd64.exe
          - os: windows-latest
            artifact: pkguard-windows-arm64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller .

      - name: Build binary
        working-directory: standalone
        run: python -m PyInstaller --name pkguard --clean --noconfirm --hidden-import requests --hidden-import concurrent.futures pkguard.py

      - name: Rename artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv standalone/dist/pkguard "${{ matrix.artifact }}"

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: mv standalone/dist/pkguard.exe "${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pkguard-*
          path: artifacts
          merge-multiple: true

      - run: ls -la artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true